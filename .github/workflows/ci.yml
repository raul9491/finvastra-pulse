name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # The Firestore emulator (used by the Meta gate) needs a JRE.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: ESLint
        run: npm run lint:es

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      # Meta webhook emulator gate — boots auth+firestore emulators + the dev server
      # pointed at an in-process mock Graph API (offline; no real Meta token).
      - name: Meta webhook gate (qa:meta)
        run: npm run qa:meta

      # Two-stage lead-SLA emulator gate — boots emulators + dev server; seeds a
      # 24/7 business-hours config for deterministic breach timing (the working-time
      # pause math is covered by unit tests).
      - name: Lead SLA gate (qa:sla)
        run: npm run qa:sla

      # FIFO pull-queue gate — FIFO claim, atomic concurrency, skill gating, release,
      # /state, SLA regression, live config reshape.
      - name: Pull-queue gate (qa:queue)
        run: npm run qa:queue

      # Connector-isolation gate — proves a connector account can reach ONLY its own
      # lead / case / payout / connector record, cannot list the staff directory or
      # the connector registry, cannot forge sourcing attribution, and that staff
      # access is unchanged. Reads Firestore DIRECTLY with each principal's token,
      # so it tests firestore.rules rather than the UI's query scoping.
      - name: Connector isolation gate (qa:connector)
        run: npm run qa:connector

      # Partner-intake gate — screening→scoring→onboarding→activation chain.
      # (Was briefly non-blocking on 2026-07-22 while its CI-only failure was
      # diagnosed: the gate had gone stale against the 2026-07-16 rule that only
      # PARTNER_DSA-category leads may enter the partner funnel. Gate fixed, so
      # this is blocking again.)
      - name: Partner gate (qa:partner)
        run: |
          set -o pipefail
          rc=0
          npm run qa:partner 2>&1 | tee partner-gate.log || rc=$?
          # Re-emit the gate's failing assertions as workflow annotations. The job-log
          # and artifact REST endpoints both require auth, but annotations are public —
          # this is what makes the CI-only failure diagnosable.
          grep -aE "✗|passed, [0-9]+ failed|Error|error:" partner-gate.log | head -20 \
            | while IFS= read -r line; do echo "::error title=qa:partner::${line}"; done
          exit $rc

      # Publishes the gate output so the failure can be read without repo-admin
      # rights (the job-log REST endpoint is admin-only even on a public repo).
      - name: Upload partner gate log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: partner-gate-log
          path: partner-gate.log
          retention-days: 7
