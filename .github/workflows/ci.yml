name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # The Firestore emulator (used by the Meta gate) needs a JRE.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: ESLint
        run: npm run lint:es

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      # Meta webhook emulator gate — boots auth+firestore emulators + the dev server
      # pointed at an in-process mock Graph API (offline; no real Meta token).
      - name: Meta webhook gate (qa:meta)
        run: npm run qa:meta

      # Two-stage lead-SLA emulator gate — boots emulators + dev server; seeds a
      # 24/7 business-hours config for deterministic breach timing (the working-time
      # pause math is covered by unit tests).
      - name: Lead SLA gate (qa:sla)
        run: npm run qa:sla

      # FIFO pull-queue gate — FIFO claim, atomic concurrency, skill gating, release,
      # /state, SLA regression, live config reshape.
      - name: Pull-queue gate (qa:queue)
        run: npm run qa:queue

      # Partner-intake gate — screening→scoring→onboarding→activation chain.
      - name: Partner gate (qa:partner)
        run: npm run qa:partner
